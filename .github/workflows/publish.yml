name: publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - id: pending
        name: Count pending changesets
        run: |
          count=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - id: version
        if: steps.pending.outputs.count == '0'
        name: Read package version and check tag
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [ "$version" = "0.0.0" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif git rev-parse "v$version" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.pending.outputs.count == '0' && steps.version.outputs.exists == 'false'
        name: Extract changelog section
        run: |
          awk -v v="${{ steps.version.outputs.version }}" '
            /^## / {
              if (in_section) exit
              if ($2 == v) { in_section=1; next }
            }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md

      - if: steps.pending.outputs.count == '0' && steps.version.outputs.exists == 'false'
        name: Tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - if: steps.pending.outputs.count == '0' && steps.version.outputs.exists == 'false'
        name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md
