name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx -y github:raniejade/rac doctor --target claude,codex --kind agent,skill
      - run: npx -y github:raniejade/rac install --target claude,codex --kind agent,skill --dry-run
